name: Publish to PyPI

on:
  release:
    types: [published]

env:
  UV_NO_MANAGED_PYTHON: "1"

jobs:
  validate-version:
    name: Validate tag matches pyproject.toml
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Checkout the exact tag being released so the pyproject.toml version
          # we read matches the release. (publish.yaml used to do this correctly.)
          ref: ${{ github.event.release.tag_name }}
      - name: Check version match
        id: check
        shell: python
        run: |
          import os
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          tag = os.environ["RELEASE_TAG"]
          normalized_tag = tag[1:] if tag.startswith("v") else tag

          if normalized_tag != version:
              raise SystemExit(
                  f"Release tag {tag!r} does not match pyproject.toml version {version!r}. "
                  f"Use tag v{version} or update pyproject.toml before publishing."
              )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"version={version}", file=output)
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

  test:
    name: Pre-publish tests
    needs: validate-version
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  publish:
    name: Build & publish to PyPI
    needs: [validate-version, test]
    runs-on: ubuntu-latest
    # The "pypi" GitHub Environment must be configured with the Trusted
    # Publisher (GitHub OIDC) for code-muse. This also gives a nice URL
    # in the GitHub UI linking to the PyPI project page after publish.
    environment:
      name: pypi
      url: https://pypi.org/project/code-muse/${{ needs.validate-version.outputs.version }}/
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
      - name: Build
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # PEP 740 attestations (via Sigstore + Rekor) are on by default for
          # Trusted Publishing. We explicitly disable them because the bundled
          # /app/attestations.py (running on Python 3.13 inside the action's
          # python:3.13-slim Docker image) performs a live POST to Rekor and
          # has no retry logic. Transient "ChunkedEncodingError: Response ended
          # prematurely" / ProtocolError failures (as seen in the traceback with
          # "payloadHash": null in debug logs) are common from GitHub runners.
          # Setting false makes releases reliable. Re-run the "Publish to PyPI"
          # job manually if you ever want to force attestations on a specific
          # release. The uv build step above uses Python 3.14; the publish
          # container is independent.
          attestations: false
